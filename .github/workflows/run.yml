name: Run Script Twice Daily

on:
  schedule:
    - cron: '*/20 0-1 * * 1-5'
    - cron: '*/20 6-7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write   # ⭐关键就是这行

jobs:
  run-job:
    runs-on: ubuntu-latest
    env:
      NAME: ${{ secrets.NAME }}   # ⭐统一放这里
      DEVICE_KEY: ${{ secrets.DEVICE_KEY }}
      PUSH_TITLE: "Dividend Strategy Trading Signals"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install deps
        run: pip install pandas numpy requests matplotlib openpyxl pytdx

      - name: Make script executable
        run: chmod +x run.sh

      - name: Run script + send message
        run: |
          ./run.sh

          message=$(grep -A 2 "💡 操作建议:" log.txt)
          echo "message: $message"
          # 去换行（拼成一行）
          message=$(echo "$message" | paste -sd " " -)
          
          # URL 编码（关键！）
          message=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$message'''))")

          # for MeoW APP push message
          url="https://api.chuckfang.com/${NAME}/${message}"
          echo "request url: $url"
          curl "$url"
          
          # for IOS Bark APP push message
          barkUrl="https://api.day.app/${DEVICE_KEY}/${PUSH_TITLE}/${message}"
          curl "$barkUrl"

      - name: Commit logs
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add log.txt fund_data 
          git commit -m "update log" || echo "no changes"
          git push
